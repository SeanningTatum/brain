<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{FEATURE}} — execution — brain-axi</title>
<style>
  /* Editorial v7 palette — fixed light, matches chrome.html / plan playbook. */
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --ink: #141413;
    --secondary: #3d3d3a;
    --muted: #73726c;
    --faint: #9c9a92;
    --border: #dedcd1;
    --highlight: #fff7ca;
    --accent: #d97757;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.55;
  }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  h1, h2, h3 {
    font-family: Charter, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ink);
  }
  h1 { font-size: 1.7em; margin: 0; }
  h2 {
    font-size: 1.25em; font-weight: 500; margin: 40px 0 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }
  h3 { font-size: 1.02em; font-weight: 500; margin: 18px 0 6px; }
  a { color: var(--ink); }

  .muted { color: var(--muted); font-size: 0.92em; }
  .empty-note { color: var(--muted); font-size: 0.92em; font-style: italic; }

  /* header */
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; }
  .status-chip {
    display: inline-block; padding: 2px 12px; border-radius: 999px;
    font-size: 0.78em; font-weight: 600; border: 1px solid var(--border);
    background: var(--surface); color: var(--secondary); white-space: nowrap;
  }
  .status-chip[data-status="shipped"] { background: var(--ink); color: #fff; border-color: var(--ink); }
  .status-chip[data-status="in-progress"] { background: var(--highlight); border-color: var(--highlight); color: var(--ink); }
  .status-chip[data-status="blocked"] { color: var(--accent); border-color: var(--accent); }
  #evidence {
    margin-top: 6px; color: var(--muted); font-size: 0.92em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* lifecycle pipeline */
  #pipeline {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    margin: 24px 0 8px; font-size: 0.85em;
  }
  #pipeline .stage {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 999px; padding: 3px 12px; color: var(--secondary);
    white-space: nowrap;
  }
  #pipeline .stage.current {
    background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600;
  }
  #pipeline .stage.future { color: var(--faint); background: transparent; }
  #pipeline .sep { color: var(--muted); }

  /* PR terminal card */
  #prCard {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px; margin: 20px 0;
  }
  #prCard .pr-title {
    font-family: Charter, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-weight: 600; font-size: 1.15em; margin-bottom: 4px;
  }
  #prCard .pr-title .tick { color: var(--accent); margin-right: 6px; }
  #prCard a { word-break: break-all; }

  /* health strip */
  #health { margin: 12px 0; font-size: 0.92em; }
  .health-line { color: var(--secondary); }
  .health-line.ok .tick { color: var(--muted); margin-right: 4px; }
  .health-line.fail { color: var(--accent); }
  .health-line.fail .cross { margin-right: 4px; }
  .health-line .detail { color: var(--muted); }

  /* run steps */
  .run-note { margin: 16px 0 24px; }
  .run-note .note-file { color: var(--muted); font-size: 0.85em; margin-bottom: 6px; }
  details.step {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin: 8px 0; overflow: hidden;
  }
  details.step summary {
    cursor: pointer; padding: 9px 14px; font-weight: 500;
    color: var(--secondary); font-size: 0.95em; user-select: none;
  }
  details.step[open] summary { border-bottom: 1px solid var(--border); }
  details.step pre {
    margin: 0; padding: 12px 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.5; color: var(--ink);
    overflow-x: auto; white-space: pre; background: var(--surface);
  }
  details.step .trunc-note {
    padding: 6px 14px 10px; color: var(--muted); font-size: 0.85em; font-style: italic;
  }

  /* verifications */
  #verifications { display: flex; flex-wrap: wrap; gap: 8px; }
  .verify-chip {
    display: inline-block; padding: 3px 12px; border-radius: 999px;
    font-size: 0.85em; font-weight: 600; border: 1px solid var(--border);
    background: var(--surface); color: var(--secondary); white-space: nowrap;
  }
  .verify-chip.fail { color: var(--accent); border-color: var(--accent); }
  .verify-chip.blocked { color: var(--muted); }

  /* checkpoints */
  .checkpoint-line { margin: 6px 0; color: var(--secondary); font-size: 0.95em; }
  .checkpoint-line .cp-date { color: var(--muted); margin-right: 8px; }

  /* screenshots */
  #shots {
    display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 10px;
  }
  #shots a { flex: 0 0 auto; display: block; line-height: 0; }
  #shots img {
    height: 96px; border: 1px solid var(--border); border-radius: 6px;
    display: block;
  }

  /* footer / connection */
  footer {
    margin-top: 56px; padding-top: 14px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 0.85em;
  }
  #connDot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex: 0 0 auto;
  }
  #connDot.connected { background: var(--accent); }

  /* load error */
  #loadError {
    display: none; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 10px; padding: 16px 20px; margin: 24px 0; color: var(--secondary);
  }
  #loadError.visible { display: block; }
</style>
</head>
<body>
<main>
  <header>
    <h1 id="featureName">{{FEATURE}}</h1>
    <span class="status-chip" id="statusChip" data-status="">…</span>
  </header>
  <div id="evidence" hidden></div>

  <div id="pipeline"></div>

  <div id="loadError"></div>

  <div id="prCard" hidden></div>

  <div id="health"></div>

  <section>
    <h2>Run steps</h2>
    <div id="runSteps"></div>
  </section>

  <section>
    <h2>Verifications</h2>
    <div id="verifications"></div>
  </section>

  <section>
    <h2>Checkpoints</h2>
    <div id="checkpoints"></div>
  </section>

  <section>
    <h2>Screenshots</h2>
    <div id="shots"></div>
  </section>

  <footer>
    <span id="connDot"></span>
    <span id="connText">brain-axi execution dashboard — live</span>
  </footer>
</main>

<script>window.WATCH = { feature: "{{FEATURE}}", brain: "{{BRAIN}}" };</script>
<script src="/dashboard.js"></script>
</body>
</html>
